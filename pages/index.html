<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/index.css">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/1940/1940308.png" type="image/x-icon">
    <title>To Do List</title>
</head>

<body>
    <div class="principal_menu">
        <section class="barra_menu">
            <header class="cabecalho">
                <h2>Menu</h2>
                <button type="button" onclick="abrir_menu">
                    <img src="../img/menu.png" alt="">
                </button>
            </header>
            <nav class="navegacao">
                <ul>
                    <li><a href="https://calendar.google.com/calendar/u/0/r" target="_blank"><img src="../img/Calendar.png" alt="">Calendário</a></li>
                    <li class=""><a href="../pages/index.html"><img src="../img/Clipboard.png" alt="">Tarefas</a></li>
                    <li><a href="https://calendar.google.com/calendar/u/0/r/settings" target="_blank"><img src="../img/Icon.png" alt="">Configurações</a></li>
                </ul>
            </nav>
            <div class="perfil">
                <img src="../img/Generic avatar.png">
                <span>Olá</span>
            </div>

        </section>
            <main class="principal">
            <h1>To do List</h1>

            <!-- Começo da página - Adicionar Tarefa -->
            <section class="nova_tarefa">
                <div class="tarefas_gerais">
                    <h2>Nova tarefa</h2>

                    <form id="tarefa_form" class="formulario_tarefa">
                        <div class="grupo_linha">
                            <div class="titulo_tarefa">
                                <label for="titulo">Título</label>
                                <input type="text" id="titulo" placeholder="Ex. Nome da tarefa">
                            </div>
                            <div class="titulo_tarefa">
                                <label for="valor">Valor da hora</label>
                                <input type="number" id="valor" placeholder="Ex. 00.00">
                            </div>
                        </div>

                        <div class="grupo_linha">
                            <div class="titulo_tarefa">
                                <label for="horas">Horas</label>
                                <input type="number" id="horas" placeholder="Ex.00">
                            </div>
                            <button type="button" class="adicionar_tarefa" onclick="adicionar()">+ Adicionar tarefa</button>
                        </div>
                    </form>
                </div>

                <!-- Cartões -->
                <div class="cartoes">
                    <div class="cartao hora">
                        <h3>Hora acumulada</h3>
                        <div class="resumo" id="horaAcumulada">Horas</div>
                        <hr>
                        
                    </div>
                    <div class="cartao valor">
                        <h3>Valor acumulado</h3>
                        <div class="resumo" id="valorAcumulado">R$00.00</div>
                        <hr>
                        
                    </div>
                </div>
            </section>

            <!-- Tarefas adicionadas -->
            <section class="lista_tarefa" id="lista_tarefa">
                <h2>Tarefas</h2>

                <!-- Aqui está comentado porque ele vai ser exibido quando o botão for adicionado -->
                <!-- <article>
                    <div class="coluna_tarefa">
                        <h4>Tarefa</h4>
                    </div>

                    <div class="coluna_tarefa">
                        <h4>Duração</h4>
                    </div>

                    <div class="coluna_tarefa">
                        <h4>Valor total</h4>
                    </div>

                    <div class="acoes">
                        <button type="button" class="editar_tarefa" onclick="editar()" title="Editar">
                            <img src="../img/edit.png" alt="Editar">
                        </button>
                        <button type="button" class="excluir_tarefa" onclick="exluir()" title="Excluir">
                            <img src="../img/delete.png" alt="Excluir">
                        </button>
                    </div>                    
                </article> -->
                <div id="taskList">
                    <!-- Aqui vai ser exibido as tarefas adicionadas -->
                </div>
                
            </section>
        </main>
    </div>    

    <script src="../scripts/index.js"></script>
</body>
</html>
