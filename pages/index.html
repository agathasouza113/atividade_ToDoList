<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/index.css">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/1940/1940308.png" type="image/x-icon">
    <title>To Do List</title>
</head>

<body>
    <div>
        <section class="barra_menu">
            <header>
                <h2>Menu</h2>
                <button type="button" onclick="abrir_menu">
                    <img src="../img/menu.png" alt="">
                </button>
            </header>
            <nav class="navegacao">
                <ul>
                    <li><a href="https://calendar.google.com/calendar/u/0/r" target="_blank"><img src="../img/Calendar.png" alt="">Calendário</a></li>
                    <li class=""><a href="../pages/index.html"><img src="../img/Clipboard.png" alt="">Tarefas</a></li>
                    <li><a href="https://calendar.google.com/calendar/u/0/r/settings" target="_blank"><img src="../img/Icon.png" alt="">Configurações</a></li>
                </ul>
            </nav>
            <div>
                <img src="../img/Generic avatar.png">
                <span>Conta</span>
            </div>

        </section>
    </div>
   

    <main class="principal">
        <h1>To do List</h1>
        <!-- Começo da página - Adicionar Tarefa -->
        <section class="nova_tarefa">
            <div class="tarefas">
                <h2>Nova tarefa</h2>
                <form id="tarefa_nova">
                    <div class="titulo_tarefa">
                        <label for="titulo">Título</label>
                        <input type="text" id="" placeholder="Ex. Nome da tarefa">
                    </div>
                    <div class="valor_tarefa">
                        <label for="valor">Valor da hora</label>
                        <input type="number" placeholder="Ex. 00.00">
                    </div>
                    <div class="horas_tarefa">
                        <label for="horas">Horas</label>
                        <input type="number" placeholder="Ex.00">
                    </div>
                    <button type="button" onclick="adicionar">+ Adcionar tarefa</button>
                </form>
            </div>

            <div class="cartoes">
                <div class="cartao_hora">
                    <h3>Horas acumuladas</h3>
                    <div class="hora_total"></div>
                    <hr>
                </div>
                <div class="cartao_valor">
                    <h3>Valor acumulado</h3>
                    <div class="valor_total"></div>
                    <hr>
                </div>
            </div>
        </section>

        <!-- Tarefas adicionadas -->
        <section>
            <h2>Tarefas</h2>
        </section>

    </main>
    
</body>
</html>
